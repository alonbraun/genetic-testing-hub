name: GeneticTesting News Agent

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run News Publisher Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic requests
          mkdir -p content/news
          python3 scripts/publish_news.py

      - name: Commit and push
        run: |
          git config user.name "GeneticTesting News Agent"
          git config user.email "agent@genetictesting.com"
          git add content/news/
          git diff --staged --quiet || git commit -m "feat: publish news article $(date +%Y-%m-%d)"
          git push

      # NOTE: the old Netlify build hook rebuilt the WRONG repo (gene-spotlight
      # prototype) and clobbered the live Next.js site. Deploys now happen via
      # the command-center daily deploy cron (git pull + netlify CLI --site).
