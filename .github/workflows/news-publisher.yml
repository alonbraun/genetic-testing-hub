name: GeneticTesting News Agent

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run News Publisher Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic requests
          mkdir -p content/news
          python3 scripts/publish_news.py

      - name: Commit and push
        run: |
          git config user.name "GeneticTesting News Agent"
          git config user.email "agent@genetictesting.com"
          git add content/news/
          git diff --staged --quiet || git commit -m "feat: publish news article $(date +%Y-%m-%d)"
          git push

      - name: Trigger Netlify deploy
        run: curl -s -X POST https://api.netlify.com/build_hooks/6a3df39b5b6b9c722d8afb29
